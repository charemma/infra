name: Deploy VPS workloads

on:
  push:
    branches: [main]
    paths:
      - "vps/**"
      - ".github/workflows/vps-deploy.yaml"
  pull_request:
    branches: [main]
    paths:
      - "vps/**"
      - ".github/workflows/vps-deploy.yaml"

permissions:
  contents: read
  pull-requests: write

env:
  PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

jobs:
  deploy:
    name: Pulumi ${{ github.event_name == 'pull_request' && 'Preview' || 'Up' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vps
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: vps/package-lock.json

      - run: npm ci

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Pulumi preview
        if: github.event_name == 'pull_request'
        uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: prod
          work-dir: vps
          comment-on-pr: true

      - name: Pulumi up
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          work-dir: vps
